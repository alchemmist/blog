baseURL = 'https://alchemmist.xyz/'
locale = 'en-us'
title = 'alchemmist'

[author]
name = "alchemmist"
email = "anton.ingrish@gmail.com"

[build]
writeStats = true

[minify]
minifyOutput = true
disableCSS = false
disableJS = false
disableHTML = false


disableKinds = ["taxonomy"]

[markup]
[markup.highlight]
style = "github"
noClasses = false
lineNos = false
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.goldmark.parser]
attribute = true
[markup.goldmark.extensions]
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['$$', '$$']]
inline = [['$', '$']]

[params]
math = true
themeVariant = "base"

[taxonomies]
tag = "tags"
topic = "topics"
genre = "genre"
author = "author"
status = "status"


defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true
disableDefaultLanguageRedirect = false

[languages]
[languages.en]
label = "English"
weight = 1
[languages.ru]
label = "Русский"
weight = 2

[outputs]
home = ["HTML", "RSS"]

[services]
[services.rss]
limit = 30

[sitemap]
changefreq = "monthly"
priority = 0.5
filename = "sitemap.xml"

# Свежий Hugo (0.160+) по умолчанию запрещает HTML-файлы как контент
# (allowContent = ['! ^text/html$']), из-за чего content/cv.html ломал сборку.
# Разрешаем любой тип контента — возвращаем прежнее поведение.
[security]
allowContent = ['.']

# Монтируем static/images ещё и в assets/images, чтобы Hugo мог обрабатывать
# контентные картинки (ресайз/WebP/srcset) через resources.Get в render hook
# (#1). Объявление mounts заменяет дефолтные — поэтому перечисляем их все.
[module]
[[module.mounts]]
source = "content"
target = "content"
[[module.mounts]]
source = "data"
target = "data"
[[module.mounts]]
source = "layouts"
target = "layouts"
[[module.mounts]]
source = "i18n"
target = "i18n"
[[module.mounts]]
source = "archetypes"
target = "archetypes"
[[module.mounts]]
source = "assets"
target = "assets"
[[module.mounts]]
source = "static"
target = "static"
[[module.mounts]]
source = "static/images"
target = "assets/images"
